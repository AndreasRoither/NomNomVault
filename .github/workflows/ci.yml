name: CI

on:
  push:
    branches:
      - main
    tags:
      - "*"

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: pnpm/action-setup@v4.3.0
        with:
          version: 10.32.1
      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: pnpm
      - uses: taiki-e/install-action@v2.68.26
        with:
          tool: just
      - run: pnpm install --frozen-lockfile
      - run: just frontend-test
      - run: just frontend-build

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-go@v6.3.0
        with:
          go-version-file: backend/go.mod
      - uses: taiki-e/install-action@v2.68.26
        with:
          tool: just
      - run: just backend-test
      - run: just backend-build

  containers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - run: docker compose build

  openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: taiki-e/install-action@v2.68.26
        with:
          tool: just
      - run: just openapi-check
