openapi: 3.0.0
info:
  contact: {}
  title: NomNomVault API
  version: 0.1.0
paths:
  /auth/login:
    post:
      description: Authenticate a local user and return the active session snapshot.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/httpapi.AuthLoginRequest"
        description: Login payload
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpapi.AuthSessionResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
        "429":
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
      summary: Log in with email and password
      tags:
        - auth
  /auth/logout:
    post:
      description: Clear the current session in the cookie-first auth flow.
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
        "403":
          description: Forbidden
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
      summary: Log out the current session
      tags:
        - auth
  /auth/refresh:
    post:
      description: Rotate the refresh record and return the current active session snapshot.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpapi.AuthSessionResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
        "429":
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
      summary: Refresh the current session
      tags:
        - auth
  /auth/register:
    post:
      description: Create a user and bootstrap the default household context.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/httpapi.AuthRegisterRequest"
        description: Register payload
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpapi.AuthSessionResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
      summary: Register a local user
      tags:
        - auth
  /auth/session:
    get:
      description: Return the authenticated user and active household context.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpapi.AuthSessionResponse"
      summary: Fetch the active browser session
      tags:
        - auth
  /imports:
    get:
      description: Return the current household import jobs using cursor pagination
        and an optional status filter.
      parameters:
        - description: Cursor token
          in: query
          name: cursor
          schema:
            type: string
        - description: Maximum number of import jobs to return
          in: query
          name: limit
          schema:
            type: integer
        - description: Filter by import job status
          in: query
          name: status
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpapi.ImportJobListResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
      summary: List import jobs
      tags:
        - imports
  "/imports/{jobId}":
    get:
      description: Return the detailed import job payload for the requested job ID.
      parameters:
        - description: Import job ID
          in: path
          name: jobId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpapi.ImportJobResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
      summary: Fetch an import job
      tags:
        - imports
  "/imports/{jobId}/cancel":
    post:
      description: Cancel a queued import job for the active household before worker
        execution starts.
      parameters:
        - description: Import job ID
          in: path
          name: jobId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpapi.ImportJobResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
      summary: Cancel an import job
      tags:
        - imports
  "/imports/{jobId}/retry":
    post:
      description: Queue a new attempt for a finished import job after explicit
        confirmation.
      parameters:
        - description: Import job ID
          in: path
          name: jobId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/httpapi.RetryImportJobRequest"
        description: Retry confirmation payload
        required: true
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpapi.ImportJobResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
      summary: Retry an import job
      tags:
        - imports
  /imports/url:
    post:
      description: Create a source record and a queued URL import job for the active
        household.
      parameters:
        - description: Client-supplied idempotency key
          in: header
          name: Idempotency-Key
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/httpapi.CreateURLImportRequest"
        description: URL import payload
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpapi.ImportJobResponse"
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpapi.ImportJobResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
      summary: Queue a URL import
      tags:
        - imports
  "/media/{mediaId}/original":
    get:
      description: Stream the original media bytes for the requested asset.
      parameters:
        - description: Media ID
          in: path
          name: mediaId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
      summary: Fetch recipe media
      tags:
        - recipes
  "/media/{mediaId}/thumbnail":
    get:
      description: Stream the stored thumbnail bytes for the requested asset.
      parameters:
        - description: Media ID
          in: path
          name: mediaId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
      summary: Fetch recipe media thumbnail
      tags:
        - recipes
  /recipes:
    get:
      description: Return the current household recipe list using cursor pagination,
        search, and tag filters.
      parameters:
        - description: Cursor token
          in: query
          name: cursor
          schema:
            type: string
        - description: Maximum number of recipes to return
          in: query
          name: limit
          schema:
            type: integer
        - description: Case-insensitive recipe search query
          in: query
          name: q
          schema:
            type: string
        - description: Repeatable tag slug filters
          in: query
          name: tag
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
        - description: Include draft recipes alongside published recipes
          in: query
          name: draft
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpapi.RecipeListResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
      summary: List recipes
      tags:
        - recipes
    post:
      description: Create a recipe for the active household.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/httpapi.CreateRecipeRequest"
        description: Create recipe payload
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpapi.RecipeDetailResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
      summary: Create a recipe
      tags:
        - recipes
  "/recipes/{recipeId}":
    get:
      description: Return the detailed recipe payload for the requested recipe ID.
      parameters:
        - description: Recipe ID
          in: path
          name: recipeId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpapi.RecipeDetailResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
      summary: Fetch a recipe detail
      tags:
        - recipes
    patch:
      description: Replace the editable recipe fields and child collections for the
        active household.
      parameters:
        - description: Recipe ID
          in: path
          name: recipeId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/httpapi.UpdateRecipeRequest"
        description: Update recipe payload
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpapi.RecipeDetailResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
      summary: Update a recipe
      tags:
        - recipes
  "/recipes/{recipeId}/archive":
    post:
      description: Mark a recipe as archived for the active household.
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
        "403":
          description: Forbidden
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
        "404":
          description: Not Found
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
      summary: Archive a recipe
      tags:
        - recipes
  "/recipes/{recipeId}/media":
    post:
      description: Upload an image and attach it to the requested recipe.
      parameters:
        - description: Recipe ID
          in: path
          name: recipeId
          required: true
          schema:
            type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  description: Recipe image file
                  type: string
                  format: binary
                altText:
                  description: Optional alt text
                  type: string
              required:
                - file
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpapi.RecipeMediaItem"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
        "415":
          description: Unsupported Media Type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
      summary: Upload recipe media
      tags:
        - recipes
  "/recipes/{recipeId}/unarchive":
    post:
      description: Mark an archived recipe as active again for the active household.
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
        "403":
          description: Forbidden
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
        "404":
          description: Not Found
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
      summary: Unarchive a recipe
      tags:
        - recipes
  /tags:
    get:
      description: Return all household-scoped recipe tags ordered by name.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpapi.TagListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
      summary: List tags
      tags:
        - tags
    post:
      description: Create one household-scoped recipe tag.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/httpapi.CreateTagRequest"
        description: Create tag payload
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpapi.RecipeTagItem"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apicontract.ErrorResponse"
      summary: Create a tag
      tags:
        - tags
servers:
  - url: /api/v1
components:
  schemas:
    apicontract.CursorPageInfo:
      properties:
        hasMore:
          type: boolean
        nextCursor:
          type: string
      type: object
    apicontract.ErrorResponse:
      properties:
        code:
          type: string
        details:
          items:
            $ref: "#/components/schemas/apicontract.ValidationError"
          type: array
        message:
          type: string
        requestId:
          type: string
        status:
          type: integer
      type: object
    apicontract.ValidationError:
      properties:
        field:
          type: string
        message:
          type: string
      type: object
    httpapi.AuthLoginRequest:
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password
      type: object
    httpapi.AuthRegisterRequest:
      properties:
        displayName:
          type: string
        email:
          type: string
        password:
          minLength: 8
          type: string
      required:
        - displayName
        - email
        - password
      type: object
    httpapi.AuthSessionResponse:
      properties:
        activeHousehold:
          $ref: "#/components/schemas/httpapi.AuthenticatedHousehold"
        authenticated:
          type: boolean
        user:
          $ref: "#/components/schemas/httpapi.AuthenticatedUser"
      type: object
    httpapi.AuthenticatedHousehold:
      properties:
        id:
          type: string
        name:
          type: string
        role:
          type: string
        slug:
          type: string
      type: object
    httpapi.AuthenticatedUser:
      properties:
        displayName:
          type: string
        email:
          type: string
        emailVerified:
          type: boolean
        id:
          type: string
        lastLoginAt:
          type: string
        role:
          type: string
      type: object
    httpapi.CreateRecipeIngredientRequest:
      properties:
        name:
          type: string
        preparation:
          type: string
        quantity:
          type: number
        sortOrder:
          type: integer
        unit:
          type: string
      required:
        - name
        - sortOrder
      type: object
    httpapi.CreateRecipeRequest:
      properties:
        cookMinutes:
          type: integer
        description:
          type: string
        ingredients:
          items:
            $ref: "#/components/schemas/httpapi.CreateRecipeIngredientRequest"
          type: array
        prepMinutes:
          type: integer
        servings:
          type: integer
        sourceUrl:
          type: string
        title:
          type: string
      required:
        - ingredients
        - title
      type: object
    httpapi.CreateTagRequest:
      properties:
        color:
          type: string
        name:
          type: string
      required:
        - name
      type: object
    httpapi.CreateURLImportRequest:
      properties:
        confirmRestart:
          type: boolean
        titleHint:
          type: string
        url:
          type: string
      required:
        - url
      type: object
    httpapi.ImportJobListResponse:
      properties:
        data:
          items:
            $ref: "#/components/schemas/httpapi.ImportJobResponse"
          type: array
        page:
          $ref: "#/components/schemas/apicontract.CursorPageInfo"
      type: object
    httpapi.ImportJobResponse:
      properties:
        attemptCount:
          type: integer
        confidenceScore:
          type: number
        conflictState:
          type: string
        createdAt:
          type: string
        draftRecipeId:
          type: string
        errorCode:
          type: string
        errorMessage:
          type: string
        finishedAt:
          type: string
        id:
          type: string
        importKind:
          type: string
        matchRecipeId:
          type: string
        normalizedPayload:
          additionalProperties: {}
          type: object
        source:
          $ref: "#/components/schemas/httpapi.SourceRecordSummary"
        startedAt:
          type: string
        status:
          type: string
        updatedAt:
          type: string
        warnings:
          items:
            type: string
          type: array
      type: object
    httpapi.RecipeDetailResponse:
      properties:
        ingredients:
          items:
            $ref: "#/components/schemas/httpapi.RecipeIngredientItem"
          type: array
        mediaAssets:
          items:
            $ref: "#/components/schemas/httpapi.RecipeMediaItem"
          type: array
        nutritionEntries:
          items:
            $ref: "#/components/schemas/httpapi.RecipeNutritionItem"
          type: array
        recipe:
          $ref: "#/components/schemas/httpapi.RecipeSummary"
        steps:
          items:
            $ref: "#/components/schemas/httpapi.RecipeStepItem"
          type: array
        tags:
          items:
            $ref: "#/components/schemas/httpapi.RecipeTagItem"
          type: array
      type: object
    httpapi.RecipeIngredientItem:
      properties:
        id:
          type: string
        name:
          type: string
        preparation:
          type: string
        quantity:
          type: number
        sortOrder:
          type: integer
        unit:
          type: string
      type: object
    httpapi.RecipeListResponse:
      properties:
        data:
          items:
            $ref: "#/components/schemas/httpapi.RecipeSummary"
          type: array
        page:
          $ref: "#/components/schemas/apicontract.CursorPageInfo"
      type: object
    httpapi.RecipeMediaItem:
      properties:
        altText:
          type: string
        checksum:
          type: string
        id:
          type: string
        mediaType:
          type: string
        mimeType:
          type: string
        originalFilename:
          type: string
        sizeBytes:
          type: integer
        sortOrder:
